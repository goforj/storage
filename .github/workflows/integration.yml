name: integration

on:
  push:
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true
          cache-dependency-path: |
            go.sum
            examples/go.sum
            integration/go.sum
            storagetest/go.sum
            driver/*/go.sum

      - name: Run integration tests
        run: |
          cd integration
          go test -tags=integration -count=1 ./all
