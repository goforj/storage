name: integration

on:
  push:
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Run integration tests
        run: |
          cd integration
          go test -tags=integration -count=1 ./all
